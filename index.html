<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌲 일본어 뮤직비디오 학습 — 森のちいさなレストラン</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d150a;
    color: #e8f0e0;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 18px;
    background: linear-gradient(135deg, #0d2010, #1a2e0d);
    border-bottom: 1px solid #2a4020;
  }
  header h1 { font-size: 1.3rem; color: #8fcc60; letter-spacing: 2px; }
  header .subtitle { font-size: 0.85rem; color: #6a9a4a; margin-top: 3px; }
  header p { font-size: 0.78rem; color: #7a9a6a; margin-top: 5px; }

  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  .video-wrap {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px #4a8a204a;
    background: #000;
  }
  .yt-container {
    position: relative; width: 100%; padding-bottom: 56.25%; background: #000;
  }
  .yt-container iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: none;
  }

  .controls {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px; background: #111; flex-wrap: wrap;
  }
  .controls label {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.85rem; color: #ccc; cursor: pointer; user-select: none;
  }
  .toggle-switch { position: relative; width: 40px; height: 22px; }
  .toggle-switch input { display: none; }
  .slider {
    position: absolute; inset: 0; background: #444;
    border-radius: 22px; transition: 0.3s; cursor: pointer;
  }
  .slider::before {
    content: ''; position: absolute;
    width: 16px; height: 16px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: 0.3s;
  }
  input:checked + .slider { background: #6db83a; }
  input:checked + .slider::before { transform: translateX(18px); }

  .sync-info { margin-left: auto; font-size: 0.75rem; color: #666; }

  /* Lyrics panel */
  .lyrics-panel {
    width: 100%; background: #111518;
    border-radius: 12px; padding: 20px;
    border: 1px solid #1e2e18;
    max-height: 440px; overflow-y: auto; scroll-behavior: smooth;
  }

  .section-label {
    font-size: 0.68rem; color: #6db83a; letter-spacing: 3px;
    text-transform: uppercase; margin: 16px 0 6px;
    padding: 3px 10px; background: #0d2010;
    border-radius: 4px; display: inline-block;
  }
  .section-label:first-child { margin-top: 0; }

  .stage-note { font-size: 0.8rem; color: #506040; font-style: italic; margin: 3px 0 8px; }

  .lyric-line {
    margin: 5px 0; line-height: 1.8;
    padding: 3px 4px; border-radius: 4px;
    border-left: 3px solid transparent;
    transition: background 0.3s;
  }
  .lyric-line.active {
    border-left-color: #6db83a;
    padding-left: 10px;
    background: #0d2010;
    border-radius: 0 6px 6px 0;
  }

  .jp-text { font-size: 1.1rem; color: #e8f0e0; }
  .lyric-line.active .jp-text .word { color: #b5e878; }

  .word {
    display: inline; cursor: pointer;
    border-radius: 3px; padding: 1px 2px;
    transition: background 0.15s, color 0.15s;
  }
  .word:hover { background: #6db83a33; color: #b5e878; }

  .ko-text {
    font-size: 0.85rem; color: #8a9a7a; margin-top: 1px; display: none;
  }
  .ko-text.visible { display: block; }

  /* Popup */
  #popup { position: fixed; display: none; z-index: 999; pointer-events: none; }
  #popup.show { display: block; }
  .popup-box {
    background: #0d2010; border: 1px solid #6db83a;
    border-radius: 10px; padding: 14px 18px;
    min-width: 230px; max-width: 320px;
    box-shadow: 0 8px 30px #0009; pointer-events: all;
    position: relative;
  }
  .popup-word { font-size: 1.4rem; font-weight: bold; color: #b5e878; margin-bottom: 2px; }
  .popup-reading { font-size: 0.9rem; color: #8fd060; margin-bottom: 3px; }
  .popup-romaji { font-size: 0.8rem; color: #6a9a4a; font-style: italic; margin-bottom: 8px; }
  .popup-meaning {
    font-size: 0.95rem; color: #e8f0e0;
    border-top: 1px solid #1e3018; padding-top: 8px;
  }
  .popup-note { font-size: 0.8rem; color: #9ab08a; margin-top: 5px; }
  .popup-close {
    position: absolute; top: 8px; right: 10px;
    cursor: pointer; color: #4a6a3a; font-size: 1rem;
  }
  .popup-close:hover { color: #b5e878; }

  /* Vocab */
  .vocab-section { width: 100%; }
  .vocab-toggle-btn {
    width: 100%; background: #0d2010; border: 1px solid #2a4020;
    color: #9ab08a; padding: 10px 16px; border-radius: 8px;
    cursor: pointer; font-size: 0.9rem; text-align: left; transition: background 0.2s;
  }
  .vocab-toggle-btn:hover { background: #122a14; }
  .vocab-grid {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 8px; margin-top: 10px;
  }
  .vocab-grid.open { display: grid; }
  .vocab-card {
    background: #111518; border: 1px solid #1e3018;
    border-radius: 8px; padding: 10px 12px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .vocab-card:hover { border-color: #6db83a; }
  .vocab-card .vc-jp { font-weight: bold; color: #b5e878; font-size: 1rem; }
  .vocab-card .vc-read { font-size: 0.75rem; color: #6db83a; }
  .vocab-card .vc-ko { font-size: 0.82rem; color: #c0d0b0; margin-top: 3px; }
</style>

function tokenize(text) {
  // Split on spaces and punctuation, keep each token as a clickable word span
  return text.split(/([\s　・、。]+)/).map(tok => {
    if (!tok || /^[\s　・、。]+$/.test(tok)) return tok;
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = tok;
    span.dataset.word = tok;
    span.addEventListener('click', e => showPopup(e, tok));
    return span;
  });
}

LYRICS.forEach((line, i) => {
  if (line.section) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = line.section;
    panel.appendChild(lbl);
  }
  if (line.stage) {
    const stg = document.createElement('div');
    stg.className = 'stage-note';
    stg.textContent = line.stage;
    panel.appendChild(stg);
  }
  if (!line.jp) return;

  const div = document.createElement('div');
  div.className = 'lyric-line';
  div.dataset.index = i;
  div.dataset.time = line.t;

  const jpDiv = document.createElement('div');
  jpDiv.className = 'jp-text';
  tokenize(line.jp).forEach(n => {
    if (typeof n === 'string') jpDiv.appendChild(document.createTextNode(n));
    else jpDiv.appendChild(n);
  });

  const koDiv = document.createElement('div');
  koDiv.className = 'ko-text';
  if (line.ko) koDiv.textContent = line.ko;

  const romaDiv = document.createElement('div');
  romaDiv.className = 'ko-text romaji-line';
  romaDiv.style.color = '#6a9a4a';
  romaDiv.style.fontSize = '0.8rem';
  if (line.roma) romaDiv.textContent = line.roma;

  div.appendChild(jpDiv);
  div.appendChild(romaDiv);
  div.appendChild(koDiv);
  panel.appendChild(div);
});

// ─── Toggles ──────────────────────────────────────────────────────────
const koToggle = document.getElementById('koToggle');
const romajiToggle = document.getElementById('romajiToggle');

function applyToggles() {
  document.querySelectorAll('.ko-text:not(.romaji-line)').forEach(el =>
    el.classList.toggle('visible', koToggle.checked));
  document.querySelectorAll('.romaji-line').forEach(el =>
    el.classList.toggle('visible', romajiToggle.checked));
}
koToggle.addEventListener('change', applyToggles);
romajiToggle.addEventListener('change', applyToggles);
applyToggles();

// ─── YouTube IFrame API ───────────────────────────────────────────────
let player = null;

window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('ytPlayer', {
    videoId: 'EYGGd2NKwtI',
    host: 'https://www.youtube-nocookie.com',
    playerVars: { rel: 0, modestbranding: 1, playsinline: 1 },
    events: { onReady: () => setInterval(syncLyrics, 250) }
  });
};

function fmt(s) {
  s = Math.floor(s || 0);
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function syncLyrics() {
  if (!player || typeof player.getCurrentTime !== 'function') return;
  const t = player.getCurrentTime();
  document.getElementById('syncInfo').textContent = '⏱ ' + fmt(t);

  const lines = [...document.querySelectorAll('.lyric-line')];
  let activeIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (parseFloat(lines[i].dataset.time) <= t) activeIdx = i;
    else break;
  }

  lines.forEach((l, i) => l.classList.toggle('active', i === activeIdx));

  if (activeIdx >= 0 && document.getElementById('autoScrollToggle').checked) {
    const el = lines[activeIdx];
    const panelEl = document.getElementById('lyricsPanel');
    const target = el.offsetTop - panelEl.offsetTop - panelEl.clientHeight / 2 + el.clientHeight / 2;
    panelEl.scrollTo({ top: target, behavior: 'smooth' });
  }
}

// ─── Popup ────────────────────────────────────────────────────────────
const popup = document.getElementById('popup');

function findEntry(word) {
  if (DICT[word]) return DICT[word];
  // partial match
  for (const [key, val] of Object.entries(DICT)) {
    if (word.includes(key) || key.includes(word)) return val;
  }
  return null;
}

function showPopup(e, word) {
  e.stopPropagation();
  const entry = findEntry(word);
  document.getElementById('pWord').textContent = word;
  if (entry) {
    document.getElementById('pReading').textContent = '読み方: ' + entry.read;
    document.getElementById('pRomaji').textContent = entry.roma;
    document.getElementById('pMeaning').textContent = '뜻: ' + entry.meaning;
    document.getElementById('pNote').textContent = entry.note ? '📌 ' + entry.note : '';
  } else {
    document.getElementById('pReading').textContent = '';
    document.getElementById('pRomaji').textContent = '';
    document.getElementById('pMeaning').textContent = '사전에 없는 단어입니다.';
    document.getElementById('pNote').textContent = '';
  }
  popup.classList.add('show');

  if (window.innerWidth < 600) {
    popup.style.left = '50%';
    popup.style.top  = '50%';
    popup.style.transform = 'translate(-50%, -50%)';
  } else {
    let left = e.clientX + 12, top = e.clientY - 20;
    const w = 300, h = 150;
    if (left + w > window.innerWidth - 10) left = e.clientX - w - 12;
    if (top + h > window.innerHeight - 10) top = window.innerHeight - h - 10;
    if (top < 10) top = 10;
    popup.style.left = left + 'px';
    popup.style.top  = top  + 'px';
    popup.style.transform = '';
  }
}

function closePopup() { popup.classList.remove('show'); }
document.addEventListener('click', e => { if (!popup.contains(e.target)) closePopup(); });

// ─── Vocab grid ───────────────────────────────────────────────────────
const vocabGrid = document.getElementById('vocabGrid');
Object.entries(DICT).forEach(([word, data]) => {
  const card = document.createElement('div');
  card.className = 'vocab-card';
  card.innerHTML = `<div class="vc-jp">${word}</div>
    <div class="vc-read">${data.read} · ${data.roma}</div>
    <div class="vc-ko">${data.meaning}</div>`;
  card.addEventListener('click', () => {
    document.getElementById('pWord').textContent = word;
    document.getElementById('pReading').textContent = '読み方: ' + data.read;
    document.getElementById('pRomaji').textContent = data.roma;
    document.getElementById('pMeaning').textContent = '뜻: ' + data.meaning;
    document.getElementById('pNote').textContent = data.note ? '📌 ' + data.note : '';
    popup.classList.add('show');
    popup.style.left = '50%';
    popup.style.top  = '50%';
    popup.style.transform = 'translate(-50%,-50%)';
  });
  vocabGrid.appendChild(card);
});

function toggleVocab() {
  document.getElementById('vocabGrid').classList.toggle('open');
}
</script>
